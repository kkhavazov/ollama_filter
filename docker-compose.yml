services:
  ollama:
    image: ollama/ollama:0.30.10
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  dashboard:
    build:
      context: .            # expects Dockerfile, requirements.txt, src/ alongside this file
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./emails.db:/app/emails.db   # mount your existing SQLite file into the container
    restart: unless-stopped

  email-filter:
    build:
      context: .
      dockerfile: Dockerfile.filter
    env_file:
      - .env
    volumes:
      - ./emails.db:/app/emails.db
    restart: unless-stopped   # or "no" if it's meant to run once and exit, not loop

volumes:
  ollama_data:
  openwebui_data: